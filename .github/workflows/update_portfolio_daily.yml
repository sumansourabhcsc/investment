name: Update Portfolio Daily Summary

permissions:
  contents: write

on:
  schedule:
    - cron: "30 5 * * *"     # 05:30 UTC
    - cron: "30 13 * * *"    # 13:30 UTC
    - cron: "30 19 * * *"    # 19:30 UTC
  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: portfolio-daily
  cancel-in-progress: false

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run portfolio daily updater
      - name: Run portfolio daily summary script
        run: |
          python scripts/update_portfolio_daily.py

      # Commit & push changes
      - name: Commit and push updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data/portfolio_daily.csv

          git commit -m "Updated portfolio daily summary" || echo "No changes to commit"

          git pull --rebase origin main || echo "No remote changes"

          git push origin main
