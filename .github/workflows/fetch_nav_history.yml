name: Fetch NAV History Twice Daily

permissions:
  contents: write

on:
  schedule:
    - cron: "30 4 * * *"   # 10:00 AM IST (IST = UTC+5:30)
    - cron: "30 16 * * *"  # 10:00 PM IST (IST = UTC+5:30)
  workflow_dispatch:

# Prevent parallel runs
concurrency:
  group: nav-history-update
  cancel-in-progress: false

jobs:
  fetch-nav-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NAV history fetch script
        run: |
          python utils/fetch_nav_history.py

      - name: Commit and push NAV history files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add NAVHistory/*.json
          git commit -m "Updated NAV history [$(date +'%Y-%m-%d %H:%M IST')]" || echo "No changes to commit"
          git pull --rebase origin main || echo "No remote changes"
          git push origin main
