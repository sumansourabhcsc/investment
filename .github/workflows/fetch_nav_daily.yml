name: Fetch AMFI NAV Multiple Times Daily

permissions:
  contents: write

on:
  schedule:
    - cron: "35 4 * * *"   # 10:05 AM IST
    - cron: "35 8 * * *"   # 2:05 PM IST
    - cron: "35 12 * * *"  # 6:05 PM IST
    - cron: "35 15 * * *"  # 9:05 PM IST
    - cron: "39 21 * * *"  # 3:09 AM IST
    - cron: "35 23 * * *"  # 5:05 AM IST
  workflow_dispatch:

jobs:
  fetch-nav:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run NAV fetch script
        run: |
          python utils/fetch_nav_all.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/nav_all_latest.txt
          git commit -m "Updated AMFI NAV list" || echo "No changes to commit"
          git push
