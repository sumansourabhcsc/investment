name: Fetch AMFI NAV Multiple Times Daily

permissions:
  contents: write

on:
  schedule:
    - cron: "35 4 * * *"
    - cron: "35 8 * * *"
    - cron: "35 12 * * *"
    - cron: "35 15 * * *"
    - cron: "39 21 * * *"
    - cron: "35 23 * * *"
  workflow_dispatch:

concurrency:
  group: nav-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← fixes Node.js 20 deprecation warning

jobs:
  fetch-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NAV fetch script
        run: |
          python utils/fetch_nav_all.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/nav_all_latest.csv
          git commit -m "Updated AMFI NAV list" || echo "No changes to commit"
          git pull --rebase origin main || echo "No remote changes"
          git push origin main
